<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - NaijaExams</title>
    <!-- 🔐 ROUTE PROTECTION (MUST BE FIRST!) -->
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/guard.js"></script>
    <!-- Other scripts -->
    <script src="js/navigation.js"></script>
    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans text-gray-800 min-h-screen flex flex-col">
    <!-- ...navigation and form HTML omitted for brevity... -->
    
    <script>
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function(e) {
            e.preventDefault();
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // Form submission - SINGLE HANDLER (no duplicates)
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');

            // Validate inputs
            if (!username || !password) {
                showToast('Please fill in all fields', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Logging in...';

            try {
                let email = username;
                if (!username.includes('@')) {
                    showToast('Please use your email address for login.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<span>Login</span><i class="fas fa-arrow-right"></i>';
                    return;
                }
                await loginUser(email, password);
                showToast('Login Successful! Welcome back.', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } catch (error) {
                let message = 'Login failed. Please try again.';
                if (error.code === 'auth/user-not-found') message = 'User not found. Please check your email.';
                if (error.code === 'auth/wrong-password') message = 'Wrong password.';
                if (error.code === 'auth/invalid-email') message = 'Invalid email address.';
                showToast(message, 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Login</span><i class="fas fa-arrow-right"></i>';
            }
        });
    </script>
</body>
</html>
